version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: notification_rabbitmq
    network_mode: host
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  publisher:
    build:
      context: .
      dockerfile: docker/Dockerfile.publisher
    container_name: notification_publisher
    network_mode: host
    volumes:
      - ./src:/app/src
    environment:
      - RABBITMQ_URL=amqp://user:password@localhost:5672/
      - LOG_LEVEL=INFO
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    container_name: notification_consumer
    network_mode: host
    volumes:
      - ./src:/app/src
    environment:
      - RABBITMQ_URL=amqp://user:password@localhost:5672/
      - LOG_LEVEL=INFO
    depends_on:
      rabbitmq:
        condition: service_healthy
